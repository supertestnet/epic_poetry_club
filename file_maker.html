<h1>Welcome to the encrypted file maker</h1>

<form>
    <p style="font-weight: bold;">File</p>
    <p><input type="file" onchange="actOnFile( this );" /></p>
</form>

<script>
    var actOnFile = param => {
        if ( param.files[ 0 ].size > 25000000 ) {alert( 'File too large, make sure it is less than 25 megabytes' ); param.value = null;}
        else {
            console.log( encodeBase64( param ) );
        }
    }
    var encodeBase64 = async file => {
        return new Promise( resolve => {
            //the next three lines handle the case where an image is passed in from an external site
            if ( "files" in file ) file = file.files[ 0 ];
            var imgReader = new FileReader();
            imgReader.onloadend = () => resolve( imgReader.result.toString() );
            imgReader.readAsDataURL( file );
        });
    }
</script>
