<h1>Welcome to the download page</h1>

<script>
    var hexToBytes = hex => Uint8Array.from( hex.match( /.{1,2}/g ).map( byte => parseInt( byte, 16 ) ) );
    var hexToBlob = ( hex, mimeType = 'application/octet-stream' ) => {
        var byteArray = new Uint8Array( hex.length / 2 );
        for ( var i = 0; i < hex.length; i += 2 ) byteArray[ i / 2 ] = parseInt( hex.substr( i, 2 ), 16 );
        return new Blob( [ byteArray ], { type: mimeType });
    }
    var saveData = ( blob, fileName ) => {
        var a = document.createElement( "a" );
        document.body.appendChild( a );
        a.style = "display: none";
        var url = window.URL.createObjectURL( blob );
        a.href = url;
        a.download = fileName;
        a.click();
        window.URL.revokeObjectURL( url );
    }
    var decryptEpub = async ( decryption_key, hex_encoded_epub, epub_name ) => {
        var decrypted = await decrypt( decryption_key, hex_encoded_epub );
        var plaintext = decrypted.substring( 64 );
        var blob = hexToBlob( plaintext );
        saveData( blob, `${epub_name}.epub` );
    }
    var decrypt = async ( decryption_key, ciphertext ) => {
        var [ emsg, iv ] = ciphertext.split( "?iv=" );
        var key_raw = hexToBytes( decryption_key );
        var key = await window.crypto.subtle.importKey(
            "raw",
            key_raw,
            "AES-CBC",
            false,
            [ "encrypt", "decrypt" ],
        );
        var decrypted = await window.crypto.subtle.decrypt(
            {
                name: "AES-CBC",
                iv: hexToBytes( iv ),
            },
            key,
            hexToBytes( emsg ),
        );
        var msg = ( new TextDecoder() ).decode( decrypted );
        return msg;
    }
    if ( $_HASH[ "decryption_key" ] ) {
        var decryption_key = $_HASH[ "decryption_key" ];
        var filename_plus_extension = $_HASH[ "filename" ] + "." + $_HASH[ "filetype" ];
        (async()=>{
            var data = await fetch( `https://epicpoetryclub.supertestnet.org/assets/encrypted_epubs/perseus_and_medusa.txt` );
            var hex_encoded_epub = await data.text();
            decryptEpub( decryption_key, hex_encoded_epub, filename_plus_extension );
        })();
    }
    var decrypt = async ( decryption_key, ciphertext ) => {
        var [ emsg, iv ] = ciphertext.split( "?iv=" );
        var key_raw = hexToBytes( decryption_key );
        var key = await window.crypto.subtle.importKey(
            "raw",
            key_raw,
            "AES-CBC",
            false,
            [ "encrypt", "decrypt" ],
        );
        var decrypted = await window.crypto.subtle.decrypt(
            {
                name: "AES-CBC",
                iv: hexToBytes( iv ),
            },
            key,
            hexToBytes( emsg ),
        );
        var msg = ( new TextDecoder() ).decode( decrypted );
        return msg;
    }
</script>
